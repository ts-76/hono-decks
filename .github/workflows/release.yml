name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Detect release baseline
        id: baseline
        shell: bash
        run: |
          package_version=$(node -p 'require("./packages/decks/package.json").version')
          baseline_tag="v${package_version}"
          if git merge-base --is-ancestor "${baseline_tag}^{commit}" HEAD 2>/dev/null; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping npm publish until hono-decks@${package_version} is published and tagged as ${baseline_tag}."
          fi
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: Upgrade npm for trusted publishing
        if: steps.baseline.outputs.ready == 'true'
        run: npm install --global npm@latest
      - name: Disable npm workspace detection for release
        if: steps.baseline.outputs.ready == 'true'
        run: bun run scripts/disable-npm-workspaces-for-release.mjs
      - name: Publish release
        if: steps.baseline.outputs.ready == 'true'
        run: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
