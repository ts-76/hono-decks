name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24"
          cache: true
          run-install: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Detect release baseline
        id: baseline
        shell: bash
        run: |
          package_version=$(node -p 'require("./packages/decks/package.json").version')
          baseline_tag="v${package_version}"
          if git merge-base --is-ancestor "${baseline_tag}^{commit}" HEAD 2>/dev/null; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping npm publish until hono-decks@${package_version} is published and tagged as ${baseline_tag}."
          fi
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run smoke:package
      - name: Upgrade npm for trusted publishing
        if: steps.baseline.outputs.ready == 'true'
        run: npm install --global npm@latest
      - name: Disable npm workspace detection for release
        if: steps.baseline.outputs.ready == 'true'
        run: bun run scripts/disable-npm-workspaces-for-release.mjs
      - name: Publish release
        if: steps.baseline.outputs.ready == 'true'
        run: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
