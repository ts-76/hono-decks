      - mistake: 'Running Node compilation inside the Worker'
        mechanism: 'The node entry depends on filesystem and compiler APIs that belong at build time; the Worker should import generated modules only.'
        wrong_pattern: |
          import { compileDecks } from "hono-decks/node";
          app.get("/decks", async (c) => c.json(await compileDecks(/* ... */)));
        correct_pattern: |
          import { decks } from "./decks";
          app.route(decks.mountPath, decks.router());
        source: 'packages/decks/README.md#public-entries'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'The build/runtime boundary is foundational to 0.1.0.'
      - mistake: 'Duplicating mount paths and route strings'
        mechanism: 'Separate strings for compilation, mounting, controls, and assets silently drift and produce broken links or asset URLs.'
        wrong_pattern: |
          app.route("/slides", decks.router());
          const presenter = `/decks/${slug}/presenter`;
        correct_pattern: |
          app.route(decks.mountPath, decks.router());
          const presenter = decks.paths(slug).presenter;
        source: 'packages/decks/README.md#one-config-one-runtime-kit'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Use the generated configured kit introduced for the current API.'
      - mistake: 'Passing executable values to client islands'
        mechanism: 'Client component props cross a generated serialization boundary and reject functions, JSX values, dates, class instances, and non-finite numbers.'
        wrong_pattern: |
          <Counter onChange={() => save()} startedAt={new Date()} />
        correct_pattern: |
          <Counter label="Votes" initial={3} />
          // Keep event handlers and state inside components/client/index.tsx.
        source: 'packages/decks/src/renderer/jsx-renderer.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Client-island props must remain JSON-serializable in 0.1.0.'
      - mistake: 'Using Fire syntax on ordinary inline markup'
        mechanism: 'The fire attribute is reserved for block-level custom components; Markdown content uses the :::fire directive and reveals follow source order.'
        wrong_pattern: |
          <p fire="fade-up">Reveal me</p>
          <Fire order={2}>Later</Fire>
        correct_pattern: |
          :::fire{effect="fade-up"}
          Reveal me
          :::

          <Chart fire="scale" at="+1" />
        source: 'packages/decks/src/generator/mdx/syntax.ts'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'The removed $fire and order forms are explicitly rejected.'
      - mistake: 'Treating external embeds as a CORS setting'
        mechanism: 'Iframe navigation does not need CORS, but browsers enforce the parent allowlist through CSP frame-ancestors.'
        wrong_pattern: |
          router: { embed: {} }
          // Add Access-Control-Allow-Origin and expect framing to work.
        correct_pattern: |
          router: {
            embed: { frameAncestors: ["https://blog.example.com"] }
          }
        source: 'packages/decks/README.md#embedding'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Invalid origins fail closed to the same-origin default.'
      - mistake: 'Publishing browser export without authorization'
        mechanism: 'When export is configured without an authorize resolver, export requests are accepted by default and may expose a billable Browser Rendering action.'
        wrong_pattern: |
          export: {
            browser: ({ c }) => c.env.BROWSER,
            pdf: true
          }
        correct_pattern: |
          export: {
            authorize: ({ c }) =>
              c.req.header("authorization") ===
              `Bearer ${c.env.DECK_EXPORT_TOKEN}`,
            browser: ({ c }) => c.env.BROWSER,
            pdf: true
          }
        source: 'packages/decks/src/server/browser-export.ts'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Authorization is optional in the type but required for protected production exports.'
      - mistake: 'Generating Slidev syntax for hono-decks'
        mechanism: 'Agents may transfer familiar Slidev conventions even though hono-decks does not provide UnoCSS utilities or the v-click directive.'
        wrong_pattern: |
          <div v-click class="grid grid-cols-2 gap-4">
            This assumes Slidev and UnoCSS.
          </div>
        correct_pattern: |
          :::fire{effect="fade-up"}
          This uses hono-decks reveal syntax.
          :::

          /* Define project classes explicitly in theme.css. */
        source: 'maintainer interview; packages/decks/src/generator/mdx/syntax.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'hono-decks intentionally uses its own Fire syntax and deck-local CSS.'

tensions:
  - name: 'Simple setup versus build/runtime separation'
    skills: ['hono-decks']
    description: 'The first-deck path should feel direct while preserving a strict boundary between Node/Bun compilation and Worker runtime code.'
    implication: 'An agent optimizing only for fewer files may compile at request time or bypass the generated facade.'
  - name: 'Visual freedom versus a fixed presentation canvas'
    skills: ['hono-decks']
    description: 'Theme authors can use arbitrary CSS, but output must remain legible on the scaled 1920 by 1080 canvas, print routes, and reduced-motion environments.'
    implication: 'An agent styling only for one browser viewport can create clipped slides, broken print output, or inaccessible motion.'
  - name: 'Convenient routes versus production exposure'
    skills: ['hono-decks']
    description: 'Presenter, external embed, and Browser Rendering routes are useful during development but need explicit production policies.'
    implication: 'An agent focused on enabling features may expose presenter information, widen framing, or leave exports unauthenticated.'

